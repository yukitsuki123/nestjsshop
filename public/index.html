<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Product Image Upload</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 16px; }
    input, button, select { display: block; margin: 8px 0; padding: 8px; width: 100%; box-sizing: border-box; }
    button { cursor: pointer; background: #4f46e5; color: #fff; border: none; border-radius: 6px; }
    #result { background: #f4f4f4; padding: 12px; border-radius: 6px; font-size: 13px; white-space: pre-wrap; }
    .product-card { border: 1px solid #ddd; border-radius: 8px; padding: 12px; margin: 8px 0; }
    .product-card img { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; margin: 4px; }
  </style>
</head>
<body>
  <h2>Upload Product Image</h2>

  <label>Product ID</label>
  <input type="text" id="productId" placeholder="paste a product UUID here" />

  <label>Image File</label>
  <input type="file" id="imageFile" accept="image/*" />

  <button onclick="uploadImage()">Upload Image</button>

  <h2>Products</h2>
  <button onclick="loadProducts()">Refresh</button>
  <div id="productList"></div>

  <pre id="result"></pre>

  <script>
    const API = 'http://localhost:3000/products';

    async function uploadImage() {
      const productId = document.getElementById('productId').value.trim();
      const file = document.getElementById('imageFile').files[0];

      if (!productId) return alert('Enter a product ID');
      if (!file)      return alert('Pick an image first');

      const fd = new FormData();
      fd.append('file', file);  // must match FileInterceptor('file')

      const res  = await fetch(`${API}/${productId}/images`, { method: 'POST', body: fd });
      const data = await res.json();
      document.getElementById('result').textContent = JSON.stringify(data, null, 2);
      loadProducts();
    }

    async function loadProducts() {
      const res  = await fetch(API);
      const data = await res.json();
      const div  = document.getElementById('productList');

      div.innerHTML = data.map(p => `
        <div class="product-card">
          <strong>${p.name}</strong> — ${p.status ?? 'no status'}<br/>
          <small>SKU: ${p.sku} | Stock: ${p.quantity}</small>
          <div>
            ${(p.images ?? []).map(img =>
              `<img src="http://localhost:3000/files/${img.name}" title="${img.name}" />`
            ).join('')}
          </div>
        </div>
      `).join('');
    }

    loadProducts();
  </script>
</body>
</html>
